name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install ESLint
        run: npm install --save-dev eslint @eslint/js globals

      - name: Run ESLint
        run: npx eslint extension.js prefs.js
